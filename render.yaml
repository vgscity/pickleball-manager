services:
  - type: web
    name: pickleball-manager
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: cd server && node --experimental-sqlite start.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /data
      - key: NODE_VERSION
        value: 22.11.0
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
