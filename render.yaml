databases:
  - name: pickleball-db
    databaseName: pickleball
    user: pickleball
    plan: free
    region: singapore

services:
  - type: web
    name: pickleball-manager
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pickleball-db
          property: connectionString
